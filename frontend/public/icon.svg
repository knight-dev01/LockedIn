<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="cutout">
      <!-- White background means "keep this part" -->
      <rect width="100" height="100" fill="white" />
      <!-- Black text means "cut a hole here" -->
      <text x="50" y="80" text-anchor="middle" fill="black" font-size="36" font-weight="900" font-family="Arial, Helvetica, sans-serif" letter-spacing="-0.5">in</text>
    </mask>
  </defs>
  
  <g fill="#000000">
    <!-- Thick Shackle -->
    <path d="M 28 45 V 36 C 28 23.8 37.8 14 50 14 C 62.2 14 72 23.8 72 36 V 45" stroke="#000000" stroke-width="15" fill="none" />
    <!-- Rounded Rect Body with text cutout mask -->
    <rect x="12" y="42" width="76" height="52" rx="14" mask="url(#cutout)" />
  </g>
</svg>
